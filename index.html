<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="canonical" href="https://getinfosearch.xyz/" />
    <meta name="theme-color" content="#1C8771" />

    <title>Get Info — Ask Anything, Get Answered by People Nearby</title>
    <meta
      name="description"
      content="Pin a location, ask any question, and get a real answer from someone there right now. Hyperlocal answers across India — in Hindi, Hinglish, or English."
    />
    <meta name="author" content="Get Info" />
    <meta
      name="keywords"
      content="hyperlocal questions, ask nearby, local answers India, real-time local help, Hinglish Q&A, neighbourhood questions, location based answers"
    />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Get Info" />
    <meta property="og:title" content="Get Info — Ask Anything, Get Answered by People Nearby" />
    <meta
      property="og:description"
      content="Pin a location, ask any question, and get a real answer from someone there right now. Hyperlocal answers across India."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://getinfosearch.xyz/" />
    <meta property="og:image" content="https://getinfosearch.xyz/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Get Info — ask anything, get answered by people nearby" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GetInfoApp" />
    <meta name="twitter:title" content="Get Info — Ask Anything, Get Answered by People Nearby" />
    <meta
      name="twitter:description"
      content="Pin a location, ask any question, and get a real answer from someone there right now."
    />
    <meta name="twitter:image" content="https://getinfosearch.xyz/og-image.png" />

    <!-- Structured data — Organization + WebSite graph -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://getinfosearch.xyz/#organization",
            "name": "Get Info",
            "url": "https://getinfosearch.xyz/",
            "logo": "https://getinfosearch.xyz/og-image.png",
            "description": "Hyperlocal Q&A platform connecting people who have questions with people nearby who have answers.",
            "areaServed": {
              "@type": "Country",
              "name": "India"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://getinfosearch.xyz/#website",
            "url": "https://getinfosearch.xyz/",
            "name": "Get Info",
            "publisher": { "@id": "https://getinfosearch.xyz/#organization" },
            "inLanguage": ["en", "hi"]
          }
        ]
      }
    </script>

    <!-- Structured data — FAQPage (separate tag, Google requirement) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is Get Info free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Browsing and asking is free. You only pay when you accept an answer that helped you — minimum ₹50, paid directly to the person who answered."
            }
          },
          {
            "@type": "Question",
            "name": "How do people earn by answering?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "When your answer is accepted by the asker, you earn ₹50 or more, sent directly to your UPI. No subscription, no joining fee."
            }
          },
          {
            "@type": "Question",
            "name": "Which cities is Get Info available in?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We're launching first in India's tier-2 and tier-3 cities. Join the waitlist and we'll notify you when we go live in your area."
            }
          },
          {
            "@type": "Question",
            "name": "What kind of questions can I ask?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Anything tied to a place — is a shop open, how long is the queue, is something available nearby, can someone help right now. You pin a location, set a radius, and ask."
            }
          },
          {
            "@type": "Question",
            "name": "Is my location private?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You choose the location you pin for each question — it doesn't have to be where you are. Precise location isn't stored beyond the active question."
            }
          },
          {
            "@type": "Question",
            "name": "What languages are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ask and answer in Hindi, Hinglish, or English — whatever feels natural."
            }
          },
          {
            "@type": "Question",
            "name": "How does Get Info keep things safe?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Every question passes through AI moderation that blocks hate speech, threats, and harmful content before it reaches anyone. Every account is verified."
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
